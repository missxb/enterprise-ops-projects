replicaCount: 2
image:
  repository: harbor.example.com/app
  tag: "1.2.0"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8080
ingress:
  enabled: true
  host: app.example.com
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 80
pdb:
  enabled: true
  maxUnavailable: 1

# ConfigMap
configMap:
  enabled: true
  data: {}
# Secret
secret:
  enabled: true
  data: {}
