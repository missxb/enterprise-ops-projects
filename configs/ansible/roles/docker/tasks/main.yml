---
# CentOS/RHEL
- name: 安装Docker依赖(CentOS/RHEL)
  yum:
    name:
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present
  when: ansible_os_family == "RedHat"

- name: 添加Docker仓库(CentOS/RHEL)
  yum_repository:
    name: docker-ce
    description: Docker CE Stable
    baseurl: https://mirrors.aliyun.com/docker-ce/linux/centos/$releasever/$basearch/stable
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: 安装Docker(CentOS/RHEL)
  yum:
    name: docker-ce-{{ docker_version }}.*
    state: present
  notify: 启动Docker
  when: ansible_os_family == "RedHat"

# Ubuntu/Debian
- name: 安装Docker依赖(Ubuntu/Debian)
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: 添加Docker GPG密钥(Ubuntu/Debian)
  apt_key:
    url: https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg
    state: present
  when: ansible_os_family == "Debian"

- name: 添加Docker仓库(Ubuntu/Debian)
  apt_repository:
    repo: "deb [arch=amd64] https://mirrors.aliyun.com/docker-ce/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
  when: ansible_os_family == "Debian"

- name: 安装Docker(Ubuntu/Debian)
  apt:
    name: "docker-ce={{ docker_version }}.*"
    state: present
    update_cache: yes
  notify: 启动Docker
  when: ansible_os_family == "Debian"

# 通用配置
- name: 配置Docker daemon
  template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
  notify: 重启Docker

- name: 添加用户到docker组
  user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"
