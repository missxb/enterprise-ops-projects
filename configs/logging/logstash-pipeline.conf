# =============================================================================
# Logstash Pipeline Configuration
# =============================================================================
# Description: Production-grade Logstash pipeline for ELK log platform
# Version: 1.0.0
# Maintainer: Enterprise Ops Team
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT: Receive logs from Filebeat
# -----------------------------------------------------------------------------
input {
  beats {
    port => 5044
    type => "beats"
    
    # TLS/SSL 配置 (生产环境建议启用)
    # ssl => true
    # ssl_certificate => "/etc/logstash/certs/logstash.crt"
    # ssl_key => "/etc/logstash/certs/logstash.key"
    
    # 连接限制
    # client_inactivity_timeout => 600
  }
}

# -----------------------------------------------------------------------------
# FILTER: Log parsing, enrichment, and transformation
# -----------------------------------------------------------------------------
filter {
  # ==========================================================================
  # 1. Multiline log merging (Java stacktraces, exception traces)
  # ==========================================================================
  multiline {
    pattern => "^%{TIMESTAMP_ISO8601}"
    negate => true
    what => "previous"
    # 超过50行的堆栈跟踪会被截断以防止内存溢出
    max_lines => 50
  }

  # ==========================================================================
  # 2. Timestamp parsing
  # ==========================================================================
  date {
    match => [
      "timestamp",
      "ISO8601",
      "yyyy-MM-dd HH:mm:ss.SSS",
      "yyyy-MM-dd HH:mm:ss,SSS",
      "yyyy-MM-dd HH:mm:ss",
      "dd/MMM/yyyy:HH:mm:ss Z",
      "EEE MMM dd HH:mm:ss yyyy"
    ]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }

  # ==========================================================================
  # 3. Log level extraction via grok
  # ==========================================================================
  grok {
    match => {
      "message" => [
        # Pattern 1: [LEVEL] message
        "\[(?<log_level>INFO|WARN|ERROR|DEBUG|FATAL|TRACE|WARNING)\]\s*%{GREEDYDATA:log_message}",
        # Pattern 2: LEVEL - message
        "(?<log_level>INFO|WARN|ERROR|DEBUG|FATAL|TRACE|WARNING)\s*[-:]\s*%{GREEDYDATA:log_message}",
        # Pattern 3: Standard Java/Log4j format
        "%{LOGLEVEL:log_level}\s*%{GREEDYDATA:log_message}",
        # Pattern 4: Apache/Nginx access log
        "%{IPORHOST:client_ip}\s*-\s*%{USER:remote_user}\s*\[%{HTTPDATE:access_time}\]\s*\"(?:%{WORD:http_method}\s*%{DATA:request_uri}(?:\s*HTTP/%{NUMBER:http_version})?|%{DATA:raw_request})\"\s*%{NUMBER:response_code}\s*(?:%{NUMBER:body_bytes_sent}|-)\s*\"(?:%{DATA:http_referer}|-)\"\s*\"%{DATA:user_agent}\"",
        # Pattern 5: JSON log fallback - keep as-is
        "^(?<log_json>.*)$"
      ]
    }
    # 仅当 message 字段非空时才执行 grok
    tag_on_failure => ["_grokparsefailure"]
    remove_field => ["message"]
  }

  # ==========================================================================
  # 4. JSON log parsing (if message was JSON)
  # ==========================================================================
  if "_json_parse" not in [tags] {
    json {
      source => "message"
      target => "log_data"
      tag_on_failure => ["_jsonparsefailure"]
      remove_field => ["message"]
    }
  }

  # ==========================================================================
  # 5. Log level normalization
  # ==========================================================================
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
    # Map common aliases
    mutate {
      gsub => [
        "^WARNING$", "WARN"
      ]
    }
  }

  # ==========================================================================
  # 6. Field enrichment and type casting
  # ==========================================================================
  # Ensure numeric fields are cast properly
  if [response_code] {
    mutate {
      convert => {
        "response_code" => "integer"
      }
    }
  }

  if [body_bytes_sent] {
    mutate {
      convert => {
        "body_bytes_sent" => "integer"
      }
    }
  }

  # ==========================================================================
  # 7. GeoIP lookup (for web access logs with client_ip)
  # ==========================================================================
  if [client_ip] and [client_ip] !~ /^(127\.0\.0\.1|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
    geoip {
      source => "client_ip"
      target => "geoip"
      add_field => { "[geoip][continent_code]" => "%{[geoip][continent_code]}" }
      add_field => { "[geoip][country_code2]" => "%{[geoip][country_code2]}" }
      add_field => { "[geoip][region_name]" => "%{[geoip][region_name]}" }
      add_field => { "[geoip][city_name]" => "%{[geoip][city_name]}" }
      add_field => { "[geoip][latitude]" => "%{[geoip][latitude]}" }
      add_field => { "[geoip][longitude]" => "%{[geoip][longitude]}" }
    }
    # Convert geoip coordinates to geo_point for Kibana maps
    if [geoip][latitude] and [geoip][longitude] {
      mutate {
        add_field => { "[geoip][location]" => "%{[geoip][longitude]},%{[geoip][latitude]}" }
      }
      mutate {
        convert => { "[geoip][location]" => "geo_point" }
      }
    }
  }

  # ==========================================================================
  # 8. User-Agent parsing (for web access logs)
  # ==========================================================================
  if [user_agent] and [user_agent] != "-" {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # ==========================================================================
  # 9. Field rename and cleanup
  # ==========================================================================
  mutate {
    # Rename fields for consistency
    rename => {
      "host" => "source_host"
      "agent" => "filebeat_agent"
      "@version" => "log_version"
    }
  }

  # ==========================================================================
  # 10. Remove unnecessary fields
  # ==========================================================================
  mutate {
    remove_field => [
      "ecs",
      "input",
      "log"
    ]
  }

  # ==========================================================================
  # 11. Add metadata fields
  # ==========================================================================
  mutate {
    add_field => {
      "pipeline_version" => "1.0.0"
      "ingested_by" => "logstash"
    }
  }
}

# -----------------------------------------------------------------------------
# OUTPUT: Send processed logs to Elasticsearch
# -----------------------------------------------------------------------------
output {
  # ==========================================================================
  # Elasticsearch output
  # ==========================================================================
  elasticsearch {
    hosts => ["${ES_HOST:elasticsearch:9200}"]
    user => "${ELASTIC_USERNAME:elastic}"
    password => "${ELASTIC_PASSWORD:changeme}"
    
    # Index naming with date-based rollover
    index => "logstash-%{+YYYY.MM.dd}"
    
    # ILM (Index Lifecycle Management) - 生产环境推荐
    # ilm_enabled => true
    # ilm_rollover_alias => "logstash"
    # ilm_pattern => "000001"
    # ilm_policy => "logstash-policy"
    
    # Bulk settings for performance
    manage_template => true
    template_name => "logstash"
    template_overwrite => true
    
    # Connection pool settings
    timeout => 60
    retry_max_interval => 30
    retry_on_conflict => 5
    
    # Document ID strategy (避免重复)
    # document_id => "%{[@metadata][_id]}"
    
    # Batch size for bulk indexing
    flush_size => 5000
    
    # Idle flush interval
    idle_flush_time => 5
    
    # Sniffing for cluster discovery
    sniffing => true
    sniffing_delay => 30
    
    # Health check
    healthcheck_path => "/_cluster/health"
  }

  # ==========================================================================
  # Dead letter queue for failed events (生产环境推荐)
  # ==========================================================================
  # 如果某些事件处理失败，写入死信队列便于后续分析
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    elasticsearch {
      hosts => ["${ES_HOST:elasticsearch:9200}"]
      user => "${ELASTIC_USERNAME:elastic}"
      password => "${ELASTIC_PASSWORD:changeme}"
      index => "logstash-dlq-%{+YYYY.MM.dd}"
      manage_template => true
      template_name => "logstash-dlq"
      flush_size => 1000
    }
  }

  # ==========================================================================
  # Log critical errors to separate index (可选)
  # ==========================================================================
  if [log_level] == "ERROR" or [log_level] == "FATAL" {
    elasticsearch {
      hosts => ["${ES_HOST:elasticsearch:9200}"]
      user => "${ELASTIC_USERNAME:elastic}"
      password => "${ELASTIC_PASSWORD:changeme}"
      index => "logstash-errors-%{+YYYY.MM.dd}"
      manage_template => true
      template_name => "logstash-errors"
      flush_size => 500
    }
  }
}
